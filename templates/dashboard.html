<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WorkSight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9333ea;
            --primary-dark: #7e22ce;
            --primary-light: #a855f7;
            --primary-glow: rgba(147, 51, 234, 0.4);
            --secondary: #c084fc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #09090b;
            --bg-card: #111114;
            --bg-elevated: #18181b;
            --border: #27272a;
            --border-purple: rgba(147, 51, 234, 0.3);
            --text-dark: #fafafa;
            --text-muted: #a1a1aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark); color: var(--text-dark); line-height: 1.6;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
        }
        .bg-glow { position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(147,51,234,0.08) 0%, transparent 70%); }
        .container { width: 100%; max-width: 640px; position: relative; z-index: 1; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 2rem; }
        .logo-icon { width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px var(--primary-glow); }
        .logo-icon svg { width: 20px; height: 20px; fill: white; }
        .logo-text { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800;
            color: var(--text-dark); letter-spacing: -0.02em; }
        .logo-text span { color: var(--primary-light); }
        .card { background: var(--bg-card); border-radius: 1rem; border: 1px solid var(--border);
            padding: 1.75rem; margin-bottom: 1.25rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .card-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
            color: var(--text-dark); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .card-title i { color: var(--primary-light); font-size: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; font-size: 0.875rem; color: var(--text-dark); margin-bottom: 0.4rem; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--border); border-radius: 0.5rem;
            font-size: 0.95rem; font-family: 'DM Sans', sans-serif; background: var(--bg-elevated); color: var(--text-dark); transition: all 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(147,51,234,0.15); }
        .form-group input::placeholder { color: #52525b; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.8rem 1.5rem; border: none; border-radius: 0.5rem;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
            cursor: pointer; transition: all 0.25s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; width: 100%; box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-danger { background: var(--danger); color: white; width: 100%; box-shadow: 0 4px 15px rgba(239,68,68,0.25); }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .staff-item { display: flex; justify-content: space-between; align-items: center;
            padding: 0.875rem 1rem; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 0.625rem; margin-bottom: 0.625rem; transition: border-color 0.2s; }
        .staff-item:hover { border-color: var(--border-purple); }
        .staff-item .info .name { font-weight: 600; font-size: 0.95rem; color: var(--text-dark); }
        .staff-item .info .meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        .btn-remove { padding: 0.4rem 0.75rem; font-size: 0.8rem;
            background: rgba(239,68,68,0.12); color: #f87171;
            border: 1px solid rgba(239,68,68,0.25); border-radius: 0.375rem;
            cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600;
            transition: all 0.2s; white-space: nowrap; }
        .btn-remove:hover { background: var(--danger); color: white; }
        .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }
        .loading i { display: block; font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary-light); }
        .alert { padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
        .alert-success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
        .alert-danger  { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
    <a href="/" class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.418 0-8-3.582-8-8s3.582-8 8-8 8 3.582 8 8-3.582 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
        </div>
        <div class="logo-text">Work<span>Sight</span></div>
    </a>

    <div class="card">
        <div class="card-title"><i class="fas fa-user-plus"></i> Invite Staff</div>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1.25rem;">Send an email invitation to a new staff member.</p>
        <div id="invite-alert" class="alert"></div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="invite-name" placeholder="e.g. Jane Smith">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="invite-email" placeholder="jane@example.com">
        </div>
        <div class="form-group">
            <label>Department</label>
            <input type="text" id="invite-dept" placeholder="e.g. Engineering">
        </div>
        <div class="form-group">
            <label>Staff ID <span style="color:var(--text-muted);font-weight:400;">(Optional)</span></label>
            <input type="text" id="invite-sid" placeholder="e.g. EMP001">
        </div>
        <button class="btn btn-primary" onclick="sendInvite()" id="invite-btn">
            <i class="fas fa-paper-plane"></i> Send Invitation
        </button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-users"></i> Staff List</div>
        <div id="staff-list">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i>Loading staff…</div>
        </div>
    </div>

    <div class="card">
        <button class="btn btn-danger" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Sign Out
        </button>
    </div>
</div>

<script>
    function showAlert(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg; el.className = 'alert alert-' + type; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    async function loadDashboard() {
        const res = await fetch('/api/admin/dashboard', { credentials: 'include' });
        const data = await res.json();
        if (!data.company) { window.location.href = '/'; return; }
        const list = document.getElementById('staff-list');
        if (!data.staff_list || !data.staff_list.length) {
            list.innerHTML = '<div class="loading"><i class="fas fa-users-slash"></i>No staff yet. Invite someone above!</div>';
            return;
        }
        list.innerHTML = '';
        data.staff_list.forEach(s => {
            const div = document.createElement('div');
            div.className = 'staff-item';
            div.innerHTML = `<div class="info">
                <div class="name">${esc(s.name)}</div>
                <div class="meta">${esc(s.department || 'No department')} · ${esc(s.email)}</div>
            </div>
            <button class="btn-remove" onclick="removeStaff(${s.id})"><i class="fas fa-trash"></i> Remove</button>`;
            list.appendChild(div);
        });
    }

    async function sendInvite() {
        const name = document.getElementById('invite-name').value.trim();
        const email = document.getElementById('invite-email').value.trim();
        const dept = document.getElementById('invite-dept').value.trim();
        const sid = document.getElementById('invite-sid').value.trim();
        const btn = document.getElementById('invite-btn');
        if (!name || !email) { showAlert('invite-alert', 'Name and Email are required.', 'danger'); return; }
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';
        const res = await fetch('/api/admin/staff/invite', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
            body: JSON.stringify({ name, email, department: dept, staff_id: sid })
        });
        const data = await res.json();
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Invitation';
        if (data.success) {
            showAlert('invite-alert', data.message || 'Invitation sent!', 'success');
            ['invite-name','invite-email','invite-dept','invite-sid'].forEach(id => document.getElementById(id).value = '');
            loadDashboard();
        } else { showAlert('invite-alert', data.error || 'Failed to send invitation.', 'danger'); }
    }

    async function removeStaff(id) {
        if (!confirm('Remove this staff member?')) return;
        await fetch('/api/admin/staff/remove', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
            body: JSON.stringify({ staff_id: id })
        });
        loadDashboard();
    }

    async function logout() {
        await fetch('/api/company/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/';
    }

    function esc(str) {
        return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    loadDashboard();
</script>
</body>
</html>

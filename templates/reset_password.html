<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - WorkSight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9333ea; --primary-dark: #7e22ce; --primary-light: #a855f7;
            --primary-glow: rgba(147,51,234,0.4);
            --bg-dark: #09090b; --bg-card: #111114; --bg-elevated: #18181b;
            --border: #27272a; --border-purple: rgba(147,51,234,0.3);
            --text-dark: #fafafa; --text-muted: #a1a1aa;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem 1rem; overflow-y: auto;
        }
        .container { width: 100%; max-width: 420px; }
        .card {
            background: var(--bg-card); border-radius: 16px;
            border: 1px solid var(--border); padding: 2.5rem;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border-purple);
        }
        .logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:2rem; }
        .logo-icon {
            width:40px; height:40px;
            background:linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius:11px; display:flex; align-items:center; justify-content:center;
        }
        .logo-icon svg { width:22px; height:22px; fill:white; }
        .logo-text { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:var(--text-dark); }
        .logo-text span { color:var(--primary-light); }
        .header { text-align:center; margin-bottom:2rem; }
        .header h1 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:var(--text-dark); margin-bottom:0.4rem; }
        .header p { color:var(--text-muted); font-size:0.875rem; }
        label { display:block; font-weight:600; color:var(--text-dark); margin-bottom:0.5rem; font-size:0.875rem; }
        input[type="password"] {
            width:100%; padding:0.875rem 1rem; border:1.5px solid var(--border); border-radius:8px;
            font-size:1rem; background:var(--bg-elevated); color:var(--text-dark);
            margin-bottom:1rem;
        }
        input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(147,51,234,0.15); }
        input::placeholder { color:#52525b; }
        #alert-box {
            display:none; padding:0.75rem 1rem; border-radius:8px;
            font-size:0.875rem; margin-bottom:1rem;
        }
        button {
            width:100%; padding:0.9rem;
            background:linear-gradient(135deg, var(--primary), var(--primary-dark));
            color:white; border:none; border-radius:8px;
            font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem;
        }
        button:hover { opacity:0.9; }
        .back { display:inline-flex; align-items:center; gap:0.4rem; color:var(--text-muted);
                font-size:0.875rem; text-decoration:none; margin-bottom:1.5rem; }
        .back:hover { color:var(--primary-light); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/login" class="back"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
        <div class="card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </div>
                <span class="logo-text">Work<span>Sight</span></span>
            </div>
            <div class="header">
                <h1>Set New Password</h1>
                <p>Choose a strong password for your account.</p>
            </div>
            <div id="alert-box"></div>
            <label for="pw1">New Password</label>
            <input type="password" id="pw1" placeholder="At least 6 characters">
            <label for="pw2">Confirm Password</label>
            <input type="password" id="pw2" placeholder="Repeat your new password">
            <button onclick="doReset()">
                <i class="fas fa-lock"></i> Update Password
            </button>
        </div>
    </div>
    <script>
        const TOKEN = "{{ token }}";

        async function doReset() {
            const pw1 = document.getElementById('pw1').value;
            const pw2 = document.getElementById('pw2').value;
            const btn = document.querySelector('button');

            if (!pw1 || pw1.length < 6) { showAlert('Password must be at least 6 characters.', 'error'); return; }
            if (pw1 !== pw2)            { showAlert('Passwords do not match.',                   'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating…';

            try {
                const res  = await fetch('/api/password-reset/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: TOKEN, password: pw1 })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('Password updated! Redirecting to sign in…', 'success');
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showAlert(data.error || 'Could not reset password. The link may have expired.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-lock"></i> Update Password';
                }
            } catch(e) {
                showAlert('Network error — please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Update Password';
            }
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alert-box');
            const s = type === 'success'
                ? 'background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#34d399;'
                : 'background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#f87171;';
            el.style.cssText = `display:block;padding:0.75rem 1rem;border-radius:8px;font-size:0.875rem;margin-bottom:1rem;${s}`;
            el.textContent = msg;
        }
    </script>
</body>
</html>
